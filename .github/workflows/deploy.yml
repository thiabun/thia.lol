name: Deploy to thia.lol

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cpanel-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Optimize assets
        run: npm run optimize:assets

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build frontend
        run: npm run build

      - name: Write deploy metadata
        run: |
          node -e "const fs = require('node:fs'); fs.writeFileSync('dist/deploy-meta.json', JSON.stringify({ app: 'thia.lol', environment: 'production', commit: process.env.GITHUB_SHA, builtAt: new Date().toISOString() }, null, 2) + '\n');"

      - name: Deploy frontend to public_html
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: dist/
          server-dir: public_html/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/config/**
            **/config.php

      - name: Deploy API to public_html/api
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: api/
          server-dir: public_html/api/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/config.php

      - name: Wait for deployed files to settle
        run: sleep 15

      - name: Smoke-test live site
        run: scripts/smoke-live.sh
