name: Deploy to thia.lol

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: vps-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Install deploy tools
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Optimize assets
        run: npm run optimize:assets

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build frontend
        run: npm run build

      - name: Build Node API
        run: npm run build:api

      - name: Write deploy metadata
        run: |
          node -e "const fs = require('node:fs'); fs.writeFileSync('dist/deploy-meta.json', JSON.stringify({ app: 'thia.lol', environment: 'production', commit: process.env.GITHUB_SHA, builtAt: new Date().toISOString() }, null, 2) + '\n');"

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$VPS_SSH_KEY"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/thia_lol_deploy
          chmod 600 ~/.ssh/thia_lol_deploy
          ssh-keyscan -T 20 -t rsa,ecdsa,ed25519 -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Verify remote deploy directories
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -euo pipefail
          ssh -o BatchMode=yes -o PasswordAuthentication=no -o KbdInteractiveAuthentication=no -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 -i ~/.ssh/thia_lol_deploy "$VPS_USER@$VPS_HOST" '
            set -euo pipefail
            test -w /srv/thia.lol/www
            test -d /srv/thia.lol/www/uploads
            test ! -w /srv/thia.lol/www/uploads
            find /srv/thia.lol/www/uploads -maxdepth 0 -type d -group www-data -perm -0020 -perm -2000 | grep -q .
            getent group www-data | awk -F: "{print \$4}" | tr "," "\n" | grep -qx thia-node-api
            test -w /srv/thia.lol/migrations
            test -w /srv/thia.lol/node-api
            test ! -e /srv/thia.lol/www/config/config.php
            command -v ffmpeg >/dev/null
            command -v ffprobe >/dev/null
            command -v google-chrome-stable >/dev/null
            test -r /etc/systemd/system/thia-node-api.service
            sudo -n /bin/systemctl cat thia-node-api.service | grep -F /srv/thia.lol/www/uploads >/dev/null
          '

      - name: Deploy frontend to VPS web root
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -euo pipefail
          rsync -az --delete \
            --exclude '/api/' \
            --exclude '/config/' \
            --exclude '/uploads/' \
            --exclude '.DS_Store' \
            -e 'ssh -o BatchMode=yes -o PasswordAuthentication=no -o KbdInteractiveAuthentication=no -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 -i ~/.ssh/thia_lol_deploy' \
            dist/ "$VPS_USER@$VPS_HOST:/srv/thia.lol/www/"

      - name: Deploy database migrations
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -euo pipefail
          rsync -az --delete \
            --no-perms \
            --exclude '.DS_Store' \
            -e 'ssh -o BatchMode=yes -o PasswordAuthentication=no -o KbdInteractiveAuthentication=no -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 -i ~/.ssh/thia_lol_deploy' \
            backend/database/migrations/ "$VPS_USER@$VPS_HOST:/srv/thia.lol/migrations/"

      - name: Deploy Node API
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -euo pipefail
          rm -rf .deploy-node-api
          mkdir -p .deploy-node-api/server
          cp package.json package-lock.json .deploy-node-api/
          cp -R server/dist .deploy-node-api/server/dist
          rsync -az --delete \
            --exclude '.DS_Store' \
            -e 'ssh -o BatchMode=yes -o PasswordAuthentication=no -o KbdInteractiveAuthentication=no -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 -i ~/.ssh/thia_lol_deploy' \
            .deploy-node-api/ "$VPS_USER@$VPS_HOST:/srv/thia.lol/node-api/"
          ssh -o BatchMode=yes -o PasswordAuthentication=no -o KbdInteractiveAuthentication=no -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 -i ~/.ssh/thia_lol_deploy "$VPS_USER@$VPS_HOST" '
            set -euo pipefail
            cd /srv/thia.lol/node-api
            npm ci --omit=dev
            chmod -R a+rX /srv/thia.lol/node-api
            sudo -n /bin/systemctl restart thia-node-api.service
            systemctl is-active thia-node-api.service
          '

      - name: Smoke-test live site
        run: scripts/smoke-live.sh

      - name: Verify Node API production routing
        run: node scripts/check-api-cutover.mjs
