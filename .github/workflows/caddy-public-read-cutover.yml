name: Caddy public read cutover

on:
  workflow_dispatch:

jobs:
  cutover:
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        env:
          CODEX_VPS_SSH_KEY: ${{ secrets.CODEX_VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          test -n "$CODEX_VPS_SSH_KEY"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$CODEX_VPS_SSH_KEY" > ~/.ssh/thia_codex_vps
          chmod 600 ~/.ssh/thia_codex_vps
          ssh-keyscan -T 20 -t rsa,ecdsa,ed25519 -H 45.143.196.174 >> ~/.ssh/known_hosts

      - name: Patch Caddy public read routes
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/thia_codex_vps -o BatchMode=yes -o PasswordAuthentication=no -o KbdInteractiveAuthentication=no -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 codex@45.143.196.174 'bash -s' <<'REMOTE'
          set -euo pipefail
          backup="/etc/caddy/Caddyfile.bak-public-reads-$(date -u +%Y%m%d%H%M%S)"
          sudo -n cp /etc/caddy/Caddyfile "$backup"
          tmp="$(mktemp)"
          sudo -n cat /etc/caddy/Caddyfile > "$tmp"
          python3 - "$tmp" <<'PY'
          from pathlib import Path
          import sys

          path = Path(sys.argv[1])
          text = path.read_text()

          if all(name in text for name in ("nodeApiRoomMembers", "nodeApiSearch", "nodeApiBadges")):
              path.write_text(text)
              raise SystemExit(0)

          block = """
          	@nodeApiRoomMembers {
          		method GET HEAD
          		path_regexp ^/api/rooms/[A-Za-z0-9-]{1,80}/members$
          	}
          	handle @nodeApiRoomMembers {
          		header X-Thia-API-Runtime node
          		uri strip_prefix /api
          		reverse_proxy 127.0.0.1:3100
          	}

          	@nodeApiSearch {
          		method GET HEAD
          		path /api/search
          	}
          	handle @nodeApiSearch {
          		header X-Thia-API-Runtime node
          		uri strip_prefix /api
          		reverse_proxy 127.0.0.1:3100
          	}

          	@nodeApiBadges {
          		method GET HEAD
          		path /api/badges
          	}
          	handle @nodeApiBadges {
          		header X-Thia-API-Runtime node
          		uri strip_prefix /api
          		reverse_proxy 127.0.0.1:3100
          	}

          """

          markers = (
              "\n\thandle /api/*",
              "\n    handle /api/*",
              "\n\thandle_path /api/*",
              "\n    handle_path /api/*",
          )

          for marker in markers:
              index = text.find(marker)
              if index != -1:
                  text = text[:index] + block + text[index:]
                  path.write_text(text)
                  break
          else:
              raise SystemExit("Could not find the PHP /api handler in /etc/caddy/Caddyfile.")
          PY
          sudo -n install -m 0644 -o root -g root "$tmp" /etc/caddy/Caddyfile
          rm -f "$tmp"
          caddy_bin="$(command -v caddy)"
          sudo -n "$caddy_bin" fmt --overwrite /etc/caddy/Caddyfile
          sudo -n "$caddy_bin" validate --config /etc/caddy/Caddyfile
          sudo -n /bin/systemctl reload caddy
          echo "Caddy backup: $backup"
          REMOTE

      - name: Verify new Node-owned production reads
        run: |
          set -euo pipefail
          for url in \
            "https://thia.lol/api/rooms/general/members" \
            "https://thia.lol/api/search?q=thia" \
            "https://thia.lol/api/badges"
          do
            headers="$(mktemp)"
            curl --fail-with-body --silent --show-error --output /tmp/thia-body.json --dump-header "$headers" "$url"
            grep -qi '^x-thia-api-runtime: node' "$headers"
            rm -f "$headers"
            echo "OK $url is served by Node"
          done
